<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haji Baba Hardware & Sanitary Store - Login</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --secondary: #06b6d4;
            --accent: #f472b6;
            --text-light: #ffffff;
            --text-gray: #cbd5e1;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-light);
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Blobs */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.6;
            animation: float 10s infinite alternate;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: var(--primary);
            top: -100px;
            left: -100px;
        }

        .blob-2 {
            width: 300px;
            height: 300px;
            background: var(--secondary);
            bottom: -50px;
            right: -50px;
            animation-delay: -2s;
        }

        .blob-3 {
            width: 200px;
            height: 200px;
            background: var(--accent);
            top: 40%;
            left: 60%;
            animation-delay: -4s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(30px, 30px);
            }
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            position: relative;
            perspective: 1000px;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .hidden {
            display: none !important;
            opacity: 0;
            pointer-events: none;
        }

        .fade-enter {
            animation: fadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .fade-exit {
            animation: fadeOut 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: translateY(0) scale(1);
            }

            to {
                opacity: 0;
                transform: translateY(-20px) scale(0.95);
            }
        }

        h1,
        h2 {
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
            text-align: center;
        }

        h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 1.8rem;
            line-height: 1.3;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-gray);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-light);
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: 0.5s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.4);
        }

        button:hover::before {
            left: 100%;
        }

        button:active {
            transform: translateY(0);
        }

        .error-message {
            color: #fca5a5;
            text-align: center;
            margin-top: 10px;
            font-size: 0.9rem;
            min-height: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        /* Success View Specifics */
        .success-icon {
            font-size: 4rem;
            text-align: center;
            margin-bottom: 20px;
            display: block;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-20px);
            }

            60% {
                transform: translateY(-10px);
            }
        }

        .welcome-text {
            text-align: center;
            color: var(--text-gray);
            margin-bottom: 30px;
        }
    </style>
</head>

<body>

    <!-- Background Elements -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="container">
        <!-- Login Form -->
        <div id="loginCard" class="card">
            <h2>Welcome Back</h2>
            <form id="loginForm" onsubmit="return false;">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="button" onclick="validateLogin()">Sign In</button>
                <div id="errorMsg" class="error-message">Invalid username or password</div>
            </form>
        </div>

        <!-- Success/Welcome View -->
        <div id="welcomeCard" class="card hidden">
            <span class="success-icon">👋</span>
            <h1>Welcome to<br>HAJI BABA<br>Hardware & Sanitary Store</h1>
            <p class="welcome-text">Your premium management dashboard is ready.</p>
            <button onclick="goToDashboard()">Get Started</button>
        </div>
    </div>

    <script>
        function validateLogin() {
            // Get values
            const usernameInput = document.getElementById('username').value;
            const passwordInput = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const loginCard = document.getElementById('loginCard');
            const welcomeCard = document.getElementById('welcomeCard');

            // Credentials requested by user
            const correctUsername = "khalidkhan";
            const correctPassword = "admin12345";

            // If Else Statement Logic as requested
            if (usernameInput === correctUsername && passwordInput === correctPassword) {
                // Success
                errorMsg.style.opacity = '0';

                // Animate transition
                loginCard.classList.add('fade-exit');

                setTimeout(() => {
                    loginCard.classList.add('hidden');
                    welcomeCard.classList.remove('hidden');
                    welcomeCard.classList.add('fade-enter');
                }, 500); // Wait for exit animation
            } else {
                // Failure
                errorMsg.textContent = "Invalid username or password. Please try again.";
                errorMsg.style.opacity = '1';

                // Shake effect for feedback
                loginCard.style.transform = "translateX(5px)";
                setTimeout(() => {
                    loginCard.style.transform = "translateX(-5px)";
                    setTimeout(() => {
                        loginCard.style.transform = "translateX(0)";
                    }, 100);
                }, 100);
            }
        }

        function goToDashboard() {
            window.location.href = "http://localhost/intigravity/index.php";
        }
    </script>
</body>

</html>
